<svg viewBox="0 0 1200 380" width="100%" height="340" xmlns="http://www.w3.org/2000/svg">
    <style>
        text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .box-bg { fill: #e6f4ea; stroke: #a7cdb3; stroke-width: 1; }
        .title { font-weight: 700; font-size: 16px; fill: #1a202c; }
        .content { font-size: 13px; fill: #4a5568; }
    </style>

    <g>
        <rect class="box-bg" x="20" y="20" width="570" height="100" rx="6"/>
        <rect x="20" y="20" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="50">Attribute Bag</text>
        <text class="content" x="40" y="78">Prefix-aware get(), remove(), replace(), set() and setMany()</text>
        <text class="content" x="40" y="98">Closure resolution &#8226; null values remove attributes safely</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="20" width="570" height="100" rx="6"/>
        <rect x="610" y="20" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="50">Attribute Rendering</text>
        <text class="content" x="630" y="78">Safe render() output &#8226; class, style, data and ARIA expansion</text>
        <text class="content" x="630" y="98">Raw normalizeAttributes() mode for DOM and SVG builders</text>
    </g>

    <g>
        <rect class="box-bg" x="20" y="140" width="570" height="100" rx="6"/>
        <rect x="20" y="140" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="170">Encoding &amp; CSS Classes</text>
        <text class="content" x="40" y="198">Context-aware content and attribute escaping &#8226; smart class merging</text>
        <text class="content" x="40" y="218">Safe helper primitives for reusable UI components</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="140" width="570" height="100" rx="6"/>
        <rect x="610" y="140" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="170">Enum Normalization</text>
        <text class="content" x="630" y="198">Enum, scalar, array and Stringable normalization for helpers</text>
        <text class="content" x="630" y="218">String representations for messages, logs and implode()</text>
    </g>

    <g>
        <rect class="box-bg" x="20" y="260" width="570" height="100" rx="6"/>
        <rect x="20" y="260" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="290">Naming &amp; Templates</text>
        <text class="content" x="40" y="318">Form input names, HTML IDs, regex pattern conversion and token rendering</text>
        <text class="content" x="40" y="338">Line break cleanup with zero framework coupling</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="260" width="570" height="100" rx="6"/>
        <rect x="610" y="260" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="290">Validation</text>
        <text class="content" x="630" y="318">int-like, positive-like, offset-like and oneOf() checks</text>
        <text class="content" x="630" y="338">Strict comparisons with deterministic exception messages</text>
    </g>
</svg>
