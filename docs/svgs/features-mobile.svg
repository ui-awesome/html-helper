<!-- Mobile version - Single column -->
<svg viewBox="0 0 620 620" width="100%" height="580" xmlns="http://www.w3.org/2000/svg">
    <style>
        text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .box-bg { fill: #e6f4ea; stroke: #a7cdb3; stroke-width: 1; }
        .title { font-weight: 700; font-size: 14px; fill: #1a202c; }
        .content { font-size: 11px; fill: #4a5568; }
    </style>

    <g>
        <rect class="box-bg" x="16" y="16" width="588" height="84" rx="6"/>
        <rect x="16" y="16" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="42">Attribute Bag</text>
        <text class="content" x="32" y="66">Prefix-aware get(), remove(), replace(), set() and setMany()</text>
        <text class="content" x="32" y="84">Closure resolution &#8226; null values remove attributes safely</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="116" width="588" height="84" rx="6"/>
        <rect x="16" y="116" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="142">Attribute Rendering</text>
        <text class="content" x="32" y="166">Safe render() output &#8226; class, style, data and ARIA expansion</text>
        <text class="content" x="32" y="184">Raw normalizeAttributes() mode for DOM and SVG builders</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="216" width="588" height="84" rx="6"/>
        <rect x="16" y="216" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="242">Encoding &amp; CSS Classes</text>
        <text class="content" x="32" y="266">Context-aware content and attribute escaping &#8226; smart class merging</text>
        <text class="content" x="32" y="284">Safe helper primitives for reusable UI components</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="316" width="588" height="84" rx="6"/>
        <rect x="16" y="316" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="342">Enum Normalization</text>
        <text class="content" x="32" y="366">Enum, scalar, array and Stringable normalization for helpers</text>
        <text class="content" x="32" y="384">String representations for messages, logs and implode()</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="416" width="588" height="84" rx="6"/>
        <rect x="16" y="416" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="442">Naming &amp; Templates</text>
        <text class="content" x="32" y="466">Form input names, HTML IDs, regex pattern conversion and token rendering</text>
        <text class="content" x="32" y="484">Line break cleanup with zero framework coupling</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="516" width="588" height="84" rx="6"/>
        <rect x="16" y="516" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="542">Validation</text>
        <text class="content" x="32" y="566">int-like, positive-like, offset-like and oneOf() checks</text>
        <text class="content" x="32" y="584">Strict comparisons with deterministic exception messages</text>
    </g>
</svg>
